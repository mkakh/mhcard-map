<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>マンホールカードマップ | 配布場所・取得状況・メモ管理</title>
    <meta name="description" content="全国のマンホールカード配布場所を地図と検索リストで確認できる無料サイトです。取得済みチェック、取得日、メモ、Google Mapsリンク、配布状況や在庫確認リンクを端末内に保存できます。">
    <meta name="keywords" content="マンホールカード,マンホールカードマップ,配布場所,在庫確認,取得済み,マンホールカード収集">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#1f7a4d">
    <meta name="application-name" content="マンホールカードマップ">
    <meta name="apple-mobile-web-app-title" content="MHカード">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="canonical" href="https://mhcard-map.com/">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/mhcard-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="マンホールカードマップ">
    <meta property="og:title" content="マンホールカードマップ | 配布場所・取得状況・メモ管理">
    <meta property="og:description" content="全国のマンホールカード配布場所を地図と検索リストで確認。取得済みチェック、取得日、メモ、配布状況、在庫確認リンクを管理できます。">
    <meta property="og:url" content="https://mhcard-map.com/">
    <meta property="og:locale" content="ja_JP">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="マンホールカードマップ | 配布場所・取得状況・メモ管理">
    <meta name="twitter:description" content="全国のマンホールカード配布場所を地図と検索リストで確認。取得済みチェック、メモ、在庫確認リンクを管理できます。">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" integrity="sha384-uTttxo/aOKbdE5RlD/SPzSDoDmNvGlUYPjONi2MN/b7c9HPSvW07OIuyP7uL6jxK" crossorigin="anonymous">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-mark" src="./icons/icon-192.png" alt="" width="42" height="42" aria-hidden="true" decoding="async">
          <div>
            <h1>マンホールカードマップ</h1>
            <p>配布場所、取得状況、ナビ情報をまとめて管理</p>
          </div>
        </div>
        <div class="top-actions">
          <button id="myPageButton" class="ghost-button" type="button">取得数・メモ</button>
        </div>
      </header>

      <nav class="mobile-tabs" aria-label="表示切り替え">
        <button class="mobile-tab active" type="button" data-mobile-panel="map">地図</button>
        <button class="mobile-tab" type="button" data-mobile-panel="list">検索</button>
        <button class="mobile-tab" type="button" data-mobile-panel="detail">詳細</button>
      </nav>

      <main class="workspace">
        <aside class="sidebar" aria-label="検索と配布場所一覧">
          <section class="search-panel">
            <label class="search-label" for="searchInput">検索</label>
            <input id="searchInput" type="search" placeholder="カード名、自治体、配布場所、Plus Code">

            <div class="filter-grid">
              <label>
                都道府県
                <select id="prefectureFilter">
                  <option value="all">すべて</option>
                </select>
              </label>
              <label>
                取得状態
                <select id="collectionFilter">
                  <option value="all">すべて</option>
                  <option value="uncollected">未取得</option>
                  <option value="collected">取得済み</option>
                </select>
              </label>
              <label>
                配布状態
                <select id="statusFilter">
                  <option value="all">すべて</option>
                  <option value="配布中">配布中</option>
                  <option value="休止中">休止中</option>
                  <option value="要確認">要確認</option>
                </select>
              </label>
              <label>
                並び順
                <select id="sortSelect">
                  <option value="prefecture">都道府県</option>
                  <option value="distance">現在地から近い順</option>
                  <option value="cardNumber">カード番号順</option>
                  <option value="updated">更新が新しい順</option>
                </select>
              </label>
            </div>
            <label class="viewport-toggle">
              <input id="viewportFilterToggle" type="checkbox">
              <span>表示範囲内のみ</span>
            </label>
            <button id="resetFiltersButton" class="ghost-button reset-button" type="button">フィルターリセット</button>
          </section>

          <section class="summary-strip" aria-label="取得サマリー">
            <div>
              <strong id="totalCount">0</strong>
              <span>表示中</span>
            </div>
            <div>
              <strong id="collectedCount">0</strong>
              <span>取得済み</span>
            </div>
            <div>
              <strong id="requestCount">0</strong>
              <span>更新要求</span>
            </div>
          </section>

          <section id="locationList" class="location-list" aria-label="配布場所"></section>
        </aside>

        <section class="map-area" aria-label="地図">
          <div class="map-toolbar">
            <div class="legend">
              <span><i class="pin-dot uncollected"></i>未取得</span>
              <span><i class="pin-dot collected"></i>取得済み</span>
              <span><i class="pin-dot paused"></i>休止</span>
              <span><i class="pin-dot review"></i>要確認</span>
              <span><i class="pin-dot approximate"></i>座標未確定</span>
              <span><i class="shape-dot stopped-known">×</i>中止・住所既知</span>
              <span><i class="shape-dot stopped-unknown">?</i>中止・住所不明</span>
              <span><i class="shape-dot geocode-failed">!</i>住所検索失敗</span>
              <span><i class="pin-dot current"></i>現在地</span>
            </div>
            <div class="map-actions">
              <button id="locateButton" class="ghost-button locate-button" type="button">現在地</button>
              <button id="printMapButton" class="ghost-button print-button" type="button">印刷</button>
            </div>
          </div>
          <div id="mapCanvas" class="map-canvas" role="application" aria-label="配布場所マップ"></div>
          <img id="printMapImage" class="print-map-image" alt="" aria-hidden="true">
          <div id="printMapPopup" class="print-map-popup" aria-hidden="true"></div>
        </section>

        <aside class="detail-panel" aria-label="配布場所詳細">
          <div id="detailContent"></div>
        </aside>
      </main>
    </div>

    <dialog id="myPageDialog" class="modal wide">
      <form method="dialog">
        <header>
          <h2>取得数・メモ</h2>
          <button id="closeMyPageDialog" class="icon-button" aria-label="閉じる" type="button">×</button>
        </header>
        <div id="myPageContent" class="my-page"></div>
      </form>
    </dialog>

    <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js" integrity="sha384-5+cfbwT0iiub6VsQAdn6yz16nr6sDiQoHx6tm4O8OVYXHYOxcffFmCJBL0dgdvGp" crossorigin="anonymous"></script>
    <script src="./app.js"></script>
  </body>
</html>
