<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>マンホールカードマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">M</span>
          <div>
            <h1>マンホールカードマップ</h1>
            <p>配布場所、取得状況、ナビ情報をまとめて管理</p>
          </div>
        </div>
        <div class="top-actions">
          <button id="myPageButton" class="ghost-button" type="button">取得状況</button>
          <button id="loginButton" class="primary-button" type="button">ログイン</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar" aria-label="検索と配布場所一覧">
          <section class="search-panel">
            <label class="search-label" for="searchInput">検索</label>
            <input id="searchInput" type="search" placeholder="カード名、自治体、配布場所、マップコード">

            <div class="filter-grid">
              <label>
                都道府県
                <select id="prefectureFilter">
                  <option value="all">すべて</option>
                </select>
              </label>
              <label>
                取得状態
                <select id="collectionFilter">
                  <option value="all">すべて</option>
                  <option value="uncollected">未取得</option>
                  <option value="collected">取得済み</option>
                </select>
              </label>
              <label>
                配布状態
                <select id="statusFilter">
                  <option value="all">すべて</option>
                  <option value="配布中">配布中</option>
                  <option value="休止中">休止中</option>
                  <option value="要確認">要確認</option>
                </select>
              </label>
              <label>
                並び順
                <select id="sortSelect">
                  <option value="prefecture">都道府県</option>
                  <option value="distance">現在地から近い順</option>
                  <option value="updated">更新が新しい順</option>
                </select>
              </label>
            </div>
          </section>

          <section class="summary-strip" aria-label="取得サマリー">
            <div>
              <strong id="totalCount">0</strong>
              <span>表示中</span>
            </div>
            <div>
              <strong id="collectedCount">0</strong>
              <span>取得済み</span>
            </div>
            <div>
              <strong id="requestCount">0</strong>
              <span>更新要求</span>
            </div>
          </section>

          <section id="locationList" class="location-list" aria-label="配布場所"></section>
        </aside>

        <section class="map-area" aria-label="地図">
          <div class="map-toolbar">
            <div class="legend">
              <span><i class="pin-dot uncollected"></i>未取得</span>
              <span><i class="pin-dot collected"></i>取得済み</span>
              <span><i class="pin-dot paused"></i>休止</span>
              <span><i class="pin-dot review"></i>要確認</span>
              <span><i class="shape-dot stopped-known">■</i>中止・住所既知</span>
              <span><i class="shape-dot stopped-unknown">◆</i>中止・住所不明</span>
              <span><i class="shape-dot geocode-failed">▲</i>住所検索失敗</span>
              <span><i class="pin-dot current"></i>現在地</span>
            </div>
            <button id="locateButton" class="ghost-button locate-button" type="button">現在地</button>
          </div>
          <div id="mapCanvas" class="map-canvas" role="application" aria-label="配布場所マップ"></div>
        </section>

        <aside class="detail-panel" aria-label="配布場所詳細">
          <div id="detailContent"></div>
        </aside>
      </main>
    </div>

    <dialog id="loginDialog" class="modal">
      <form method="dialog" id="loginForm">
        <header>
          <h2>ログイン</h2>
          <button id="closeLoginDialog" class="icon-button" aria-label="閉じる" type="button">×</button>
        </header>
        <label>
          メールアドレス
          <input id="emailInput" type="email" required placeholder="collector@example.com">
        </label>
        <label>
          パスワード
          <input id="passwordInput" type="password" required minlength="4" placeholder="4文字以上">
        </label>
        <button class="primary-button full" value="default" type="submit">ログイン</button>
      </form>
    </dialog>

    <dialog id="requestDialog" class="modal">
      <form method="dialog" id="requestForm">
        <header>
          <h2>情報更新要求</h2>
          <button id="closeRequestDialog" class="icon-button" aria-label="閉じる" type="button">×</button>
        </header>
        <input id="requestLocationId" type="hidden">
        <label>
          種類
          <select id="requestType">
            <option>配布場所が違う</option>
            <option>配布時間が違う</option>
            <option>休館日が違う</option>
            <option>在庫がない</option>
            <option>配布再開</option>
            <option>マップコードが違う</option>
            <option>住所または位置が違う</option>
            <option>公式URLが違う</option>
            <option>その他</option>
          </select>
        </label>
        <label>
          参考URL
          <input id="referenceUrl" type="url" placeholder="https://example.jp">
        </label>
        <label>
          本文
          <textarea id="requestMessage" rows="5" required placeholder="確認した内容を入力"></textarea>
        </label>
        <button class="primary-button full" value="default" type="submit">送信</button>
      </form>
    </dialog>

    <dialog id="myPageDialog" class="modal wide">
      <form method="dialog">
        <header>
          <h2>取得状況</h2>
          <button id="closeMyPageDialog" class="icon-button" aria-label="閉じる" type="button">×</button>
        </header>
        <div id="myPageContent" class="my-page"></div>
      </form>
    </dialog>

    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
