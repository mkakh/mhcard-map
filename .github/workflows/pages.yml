name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static files
        run: |
          mkdir -p dist
          cp index.html app.js styles.css dist/
          cp robots.txt sitemap.xml dist/
          cp manifest.webmanifest dist/
          cp -R icons dist/icons
          cp LICENSE NOTICE.md dist/
          cp CNAME dist/
          cp -R data dist/data
      - name: Set asset version
        run: |
          APP_VERSION="$(git rev-parse --short HEAD)"
          find dist -type f \( -name "*.html" -o -name "*.js" \) -print0 | xargs -0 sed -i "s/__APP_VERSION__/${APP_VERSION}/g"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
