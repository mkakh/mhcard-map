name: Update Location Data

on:
  schedule:
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install OCR tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr imagemagick
      - name: Import GKP data
        run: npm run import:gkp
      - name: Verify card image codes
        run: npm run apply:image-codes
      - name: Normalize source links
        run: npm run normalize:links
      - name: Geocode locations
        run: npm run geocode
      - name: Generate Plus Codes
        run: npm run update:codes
      - name: Import Google Form responses
        run: npm run import:forms
        env:
          GOOGLE_FORM_RESPONSES_CSV_URL: ${{ secrets.GOOGLE_FORM_RESPONSES_CSV_URL }}
      - name: Validate generated data
        run: npm run validate:data
      - name: Summarize location changes
        run: node scripts/summarize-location-diff.js
      - name: Create update pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/location-data-update
          title: "chore: update location data"
          commit-message: "chore: update location data"
          body-path: .tmp/location-update-summary.md
          reviewers: mkakh
